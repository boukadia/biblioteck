version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: bibliotech-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bibliotech
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./BACKEND
    container_name: bibliotech-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/bibliotech"
      JWT_SECRET: "votre_secret_jwt"
    depends_on:
      - db
    volumes:
      - ./BACKEND:/app
      - /app/node_modules

  frontend:
    build:
      context: ./FRONTEND
    container_name: bibliotech-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./FRONTEND:/app
      - /app/node_modules

volumes:
  db_data:
